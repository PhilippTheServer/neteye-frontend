<div class="shell">
  <!-- ── Header ────────────────────────────────────────────────────────── -->
  <header class="header">
    <span class="logo">NETEYE</span>
    <span class="sep">|</span>
    <span class="subtitle">NETWORK TOPOLOGY MONITOR</span>
    <div class="spacer"></div>
    <div class="stat-chips">
      <span class="chip">
        <span class="chip-dot" [class.online]="topo.connected()"></span>
        {{ topo.connected() ? 'CONNECTED' : 'OFFLINE' }}
      </span>
      <span class="chip">{{ onlineCount }}/{{ totalCount }} devices</span>
    </div>
  </header>

  <!-- ── Workspace ──────────────────────────────────────────────────────── -->
  <div class="workspace">
    <!-- Sidebar -->
    <app-sidebar
      [mapRef]="topoMap"
      [selectedDevice]="selectedDevice()"
      (deviceClick)="onDeviceSelected($event)"
    />

    <!-- Canvas area -->
    <div class="canvas-area">
      <app-topology-map
        #topoMap
        (deviceSelected)="onDeviceSelected($event)"
      />

      <!-- Device detail panel (slides in from right) -->
      @if (detailOpen()) {
        <div class="detail-overlay">
          <div class="detail-panel">
            <button class="close-btn" (click)="closeDetail()">✕</button>
            <app-metrics-chart [device]="selectedDevice()" />
          </div>
        </div>
      }
    </div>
  </div>
</div>
