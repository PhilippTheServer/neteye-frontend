name: CI / Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

jobs:
  # ── Lint & format check ─────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

  # ── Unit tests ──────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        # @angular/build:unit-test delegates to vitest, which detects CI mode
        # automatically and exits after a single run (no --watch needed).
        run: npm test

  # ── Production build ────────────────────────────────────────────────────────
  build:
    name: Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7
          if-no-files-found: error

  # ── Release (tags only) ─────────────────────────────────────────────────────
  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create GitHub releases

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # needed for --generate-notes changelog

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create release archive
        run: |
          ARCHIVE="neteye-frontend-${{ github.ref_name }}.tar.gz"
          tar -czf "$ARCHIVE" -C dist .
          sha256sum "$ARCHIVE" > SHA256SUMS
          echo "── SHA256SUMS ──"
          cat SHA256SUMS

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "neteye-frontend ${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag \
            "neteye-frontend-${{ github.ref_name }}.tar.gz" \
            SHA256SUMS
